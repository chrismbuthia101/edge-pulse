name: Nightly
on:
  schedule:
    - cron: "0 3 * * *"
jobs:
  audit:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./edge-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install poetry
      - run: poetry install --extras "linux" --with dev
      - run: pip install pip-audit -q
      - run: pip-audit --requirement <(poetry export --without-hashes)

  container-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
