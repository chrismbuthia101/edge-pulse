name: Release
on:
  push:
    tags: ["v*"]
jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: gem install fpm --no-document
      - run: bash packaging/linux/build_deb.sh
      - run: sha256sum packaging/dist/*.deb > packaging/dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packaging/dist/

  build-rpm:
    runs-on: ubuntu-24.04
    container: fedora:40
    steps:
      - run: dnf install -y python3 ruby rpm-build && gem install fpm
      - uses: actions/checkout@v4
      - run: bash packaging/linux/build_rpm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: packaging/dist/

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyinstaller nsis
      - run: powershell -ExecutionPolicy Bypass -File packaging/windows/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/dist/

  release:
    needs: [build-deb, build-rpm, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: "**/*.deb,**/*.rpm,**/*.exe,**/SHA256SUMS"