name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./edge-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install poetry
      - run: poetry install --extras "linux" --with dev
      - run: poetry run black --check src/
      - run: poetry run ruff check src/
      - run: poetry run mypy src/ --ignore-missing-imports
      - run: pip install pip-audit -q
      - run: pip-audit --requirement <(poetry export --without-hashes)

  build-deb:
    needs: [ci]
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./edge-agent
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo gem install fpm --no-document
      - run: pip install --upgrade pip build poetry
      - run: bash packaging/linux/build_deb.sh
      - run: sha256sum packaging/dist/*.deb > packaging/dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: edge-agent/packaging/dist/

  build-rpm:
    needs: [ci]
    runs-on: ubuntu-24.04
    container: fedora:40
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    steps:
      - run: dnf install -y python3 python3-pip ruby rpm-build && gem install fpm
      - uses: actions/checkout@v4
      - run: pip install --upgrade pip build poetry
      - run: bash edge-agent/packaging/linux/build_rpm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: edge-agent/packaging/dist/

  build-windows:
    needs: [ci]
    runs-on: windows-2022
    defaults:
      run:
        working-directory: ./edge-agent
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: choco install nsis --no-progress
      - run: pip install pyinstaller
      - run: powershell -ExecutionPolicy Bypass -File packaging/windows/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: edge-agent/packaging/dist/

  release:
    needs: [build-deb, build-rpm, build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: "**/*.deb,**/*.rpm,**/*.exe,**/SHA256SUMS"
