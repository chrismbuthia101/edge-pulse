[tool.poetry]
name = "edge-agent"
version = "0.1.0"
description = "Edge agent for edge-pulse monitoring system"
authors = ["cipher_101"]
readme = "README.md"
packages = [{include = "edgepulse_win", from = "src"}]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.dependencies]
python = ">=3.9,<3.13"
psutil = "^5.9.0"
numpy = "^1.24.0,<2.0.0"
pandas = "^2.0.0"
scikit-learn = "^1.3.0,<1.4.0"
tensorflow = {version = "^2.13.0,<2.16.0", optional = true}
tflite-runtime = {version = ">=2.13.0,<2.16.0", optional = true}
shap = {version = "^0.42.0,<0.43.0", optional = true}
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
pyyaml = "^6.0"
cryptography = "^41.0.0"
structlog = "^23.2.0"
prometheus-client = "^0.19.0"
aiosqlite = "^0.19.0"
supabase = {version = "^1.0.0", optional = true}
httpx = "^0.24.0"
tenacity = "^8.2.0"
python-dateutil = "^2.8.2"
joblib = "^1.3.0"
fastapi = {version = "^0.104.0", optional = true}
uvicorn = {version = "^0.24.0", optional = true}
notify-py = {version = "^0.3.0", optional = true}
pywin32 = {version = "^306", optional = true, markers = "sys_platform == 'win32'"}
keyring = {version = "^24.0.0", optional = true}
watchdog = {version = "^3.0.0", optional = true}

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
black = "^23.0.0"
flake8 = "^6.0.0"
mypy = "^1.5.0"

[tool.poetry.extras]
ml-training = ["tensorflow", "shap"]
ml-inference = ["tflite-runtime", "shap"]
ml-full = ["tensorflow", "tflite-runtime", "shap"]
cloud = ["supabase"]
api-full = ["fastapi", "uvicorn"]
notifications = ["notify-py"]
windows = ["pywin32", "keyring", "watchdog"]
all = ["tflite-runtime", "shap", "supabase", "fastapi", "uvicorn", "notify-py", "pywin32", "keyring", "watchdog"]

[tool.poetry.scripts]
edge-agent = "src.edgepulse_win.__main__:main"