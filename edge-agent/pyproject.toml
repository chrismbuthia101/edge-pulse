[tool.poetry]
name = "edge-agent"
version = "0.1.2"
description = "Edge agent for edge-pulse monitoring system"
authors = ["cipher_101"]
readme = "README.md"
packages = [{include = "edgepulse", from = "src"}]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.dependencies]
# ── Python runtime ─────────────────────────────────────────────────────────────
python = ">=3.9,<3.14"

# ── Core (always installed) ────────────────────────────────────────────────────
psutil            = "^5.9.0"
numpy             = ">=1.26.0,<3.0.0"
pandas            = "^2.1.0"      
pyarrow           = ">=15.0.0"
scikit-learn      = ">=1.4.0,<2.0.0"
pydantic          = "^2.5.0"
pydantic-settings = "^2.1.0"
pyyaml            = "^6.0"
cryptography      = ">=41.0.0,<44.0.0"
structlog         = "^24.1.0"
aiosqlite         = "^0.20.0"
httpx             = ">=0.27.0,<1.0.0"
tenacity          = "^8.2.0"
joblib            = "^1.3.0"

# ── Optional: ML training (autoencoder) ────────────────────────────────────────
tensorflow        = {version = ">=2.13.0,<2.16.0", optional = true, markers = "python_version < '3.12'"}
tflite-runtime    = {version = ">=2.13.0,<2.16.0", optional = true, markers = "python_version < '3.12'"}
shap              = {version = ">=0.45.0,<1.0.0", optional = true}

# ── Optional: API server ────────────────────────────────────────────────────────
fastapi           = {version = "^0.111.0", optional = true}
uvicorn           = {version = "^0.30.0", optional = true}

# ── Optional: desktop notifications ────────────────────────────────────────────
notify-py         = {version = "^0.3.0", optional = true}

# ── Optional: Windows service ──────────────────────────────────────────────────
pywin32           = {version = "^306", optional = true, markers = "sys_platform == 'win32'"}
keyring           = {version = "^25.0.0", optional = true} 
watchdog          = {version = "^4.0.0", optional = true}

# Optional: Linux credential storage
secretstorage     = {version = "^3.2.0", optional = true, markers = "sys_platform == 'linux'"}

[tool.poetry.group.dev.dependencies]
pytest     = "^7.4.0"
black      = "^24.0.0"
flake8     = "^7.0.0"
mypy       = "^1.8.0"
scikit-learn = ">=1.4.0,<2.0.0"
numpy        = ">=1.26.0,<3.0.0"
joblib       = "^1.3.0"

[tool.poetry.extras]
ml-explain  = ["shap"]
ml-training = ["tensorflow", "shap"]
ml-inference = ["tflite-runtime", "shap"]
ml-full     = ["tensorflow", "tflite-runtime", "shap"]
api-full    = ["fastapi", "uvicorn"]
notifications = ["notify-py"]
windows     = ["pywin32", "keyring", "watchdog"]
linux       = ["keyring", "secretstorage"]

# Everything (note: TF extras only install on Python < 3.12)
all = [
    "tensorflow",
    "tflite-runtime",
    "shap",
    "fastapi",
    "uvicorn",
    "notify-py",
    "pywin32",
    "keyring",
    "watchdog",
    "secretstorage",
]

[tool.poetry.scripts]
edge-agent = "edgepulse.__main__:main"

# ── Tool configuration ─────────────────────────────────────────────────────────
[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_error_summary = true
warn_unused_ignores = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]