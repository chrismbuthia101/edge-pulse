[tool.poetry]
name = "edgepulse-agent"
version = "1.0.0"
description = "ML-powered edge device anomaly detection"
authors = ["EdgePulse Team"]
readme = "README.md"
packages = [{include = "edgepulse_win", from = "src"}]

[tool.poetry.dependencies]
python = "^3.9"
psutil = "^5.9.0"
numpy = "^1.24.0"
pandas = "^2.0.0"
scikit-learn = "^1.3.0"
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
pyyaml = "^6.0"
cryptography = "^41.0.0"
structlog = "^23.2.0"
prometheus-client = "^0.19.0"

# ML (conditional - only on devices with resources)
tensorflow = {version = "^2.13.0", optional = true}
shap = {version = "^0.42.0", optional = true}

# Async database
aiosqlite = "^0.19.0"

# Cloud sync (optional)
supabase = {version = "^1.0.0", optional = true}
httpx = "^0.25.0"

# Resilience
tenacity = "^8.2.0"

# Additional existing dependencies
python-dateutil = "^2.8.2"

[tool.poetry.extras]
ml-full = ["tensorflow", "shap"]
cloud = ["supabase"]
api-full = ["fastapi", "uvicorn"]
windows = ["win10toast-ng"]

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
black = "^23.7.0"
ruff = "^0.1.0"
mypy = "^1.5.0"

[tool.poetry.group.optional.dependencies]
win10toast-ng = {version = "^0.1.4", markers = "sys_platform == 'win32'"}

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ['py39']

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
