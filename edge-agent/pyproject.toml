[tool.poetry]
name = "edge-pulse-agent"
version = "1.0.0"
description = "Edge device anomaly detection agent"
authors = ["EdgePulse Team"]
readme = "README.md"
packages = [{include = "agent"}]

[tool.poetry.dependencies]
python = "^3.9"
psutil = "^5.9.0"
numpy = "^1.24.0"
pandas = "^2.0.0"
scikit-learn = "^1.3.0"
tensorflow = "^2.13.0"
shap = "^0.42.0"
cryptography = "^41.0.0"
supabase = {version = "^1.0.0", optional = true}
pyyaml = "^6.0"
python-dateutil = "^2.8.2"
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"

[tool.poetry.extras]
cloud = ["supabase"]
windows = ["win10toast-ng"]

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
black = "^23.7.0"
mypy = "^1.5.0"
ruff = "^0.1.0"

[tool.poetry.group.optional.dependencies]
win10toast-ng = {version = "^0.1.4", markers = "sys_platform == 'win32'"}

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ['py39']

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py39"
